services:
  # --- SERVIÇO DO BACKEND ---
  backend:
    image: heitorsouzasoares/techlibras-backend:latest
    ports:
      - "10000:10000"
    restart: always
    env_file:
      - .env

  # --- SERVIÇO DO FRONTEND (Atualizado para o Node 22) ---
  frontend:
    image: node:22-slim  # <--- Mudamos de 18 para 22 aqui!
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    restart: always
    depends_on:
      - backend